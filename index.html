<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mój Zarobek v4.28</title>
<style>
:root { --blue: #00eaff; --green: #00ffa6; --orange: #ff9900; --red: #ff4040; --bg: #0b0f14; --panel: #1a242d; }
html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); overflow: hidden; }
body { color: white; font-family: Arial; display: flex; flex-direction: column; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; box-sizing: border-box; }
.container { max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; }

/* NAGŁÓWEK */
.header { margin-bottom: 15px; flex-shrink: 0; text-align: center; }
#dayLabel { font-size: 14px; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.clock { font-size: 42px; color: var(--blue); text-shadow: 0 0 15px var(--blue); line-height: 1; margin: 5px 0; }
#monthTitle { font-size: 20px; color: var(--blue); font-weight: bold; margin: 10px 0 5px 0; text-transform: uppercase; }

.progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 8px 0; overflow: hidden; }
#progress-bar { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 10px var(--blue); transition: width 0.5s; }
.todayWork { font-size: 16px; color: var(--green); font-weight: bold; }
.break-timer { font-size: 14px; margin-top: 4px; color: var(--orange); font-weight: bold; min-height: 18px; height: 18px; }

/* TABELA */
.table-wrapper { flex: 1 1 auto; overflow-y: auto; border: 1px solid #333; border-radius: 8px; background: #111a22; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { position: sticky; top: 0; background: var(--panel); color: var(--blue); padding: 12px 5px; z-index: 2; border-bottom: 2px solid #333; text-transform: uppercase; font-size: 11px; }
td { padding: 12px 5px; border-bottom: 1px solid #333; text-align: center; }

/* KOLORY DNI I IKONEK */
.saturday { color: var(--blue); }
.saturday .edit-btn { fill: var(--blue); }
.sunday { color: var(--red); }
.sunday .edit-btn { fill: var(--red); }

.today { background: rgba(255, 153, 0, 0.15) !important; color: var(--orange) !important; font-weight: bold; }
.dayOff { opacity: 0.3; text-decoration: line-through; }
.weekSummary { background: rgba(0,0,0,0.4); color: var(--green); font-weight: bold; font-size: 12px; }
.edit-btn { width: 22px; height: 22px; fill: #666; cursor: pointer; }

/* STOPKA */
.footer { flex-shrink: 0; background: var(--panel); padding: 15px; border-radius: 12px; border-top: 3px solid var(--green); }
.total-row { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 8px; }
.btn-nav { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid var(--blue); background: rgba(0,234,255,0.05); color: var(--blue); font-weight: bold; cursor: pointer; }

/* MODAL */
#editModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); padding: 20px; border: 2px solid var(--blue); z-index: 200; border-radius: 15px; width: 90%; max-width: 340px; box-shadow: 0 0 50px #000; max-height: 85vh; overflow-y: auto; }
.modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:150; }
.time-row { display: flex; gap: 10px; margin-bottom: 5px; }
.time-row input { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; width: 100%; text-align: center; font-size: 15px; }
.modal-label { display: block; font-size: 11px; color: var(--blue); margin-bottom: 3px; text-transform: uppercase; }
.break-label { display: block; font-size: 10px; color: var(--green); margin: 8px 0 2px 0; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="dayLabel">--</div>
        <div class="clock" id="clock">00:00:00</div>
        <div id="monthTitle">---</div>
        <div id="weather-info" style="text-align: center; font-size: 13px; color: var(--blue); margin-bottom: 10px; min-height: 18px;">
    Pobieram dane pogodowe...
        </div>
        
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="todayWork" id="todayWork">--</div>
        <div class="break-timer" id="breakTimer"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>Data</th><th>Dzień</th><th>H</th><th>PLN</th><th>⚙️</th></tr></thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="total-row"><span>Suma godzin:</span><span id="totalHours" style="color:var(--green);">0.00</span></div>
        <div class="total-row"><span>Zarobek:</span><span id="totalMoney" style="color:var(--green);">0 zł</span></div>
        <div style="display:flex; gap:12px; margin-top:10px;">
            <button class="btn-nav" onclick="changeMonth(-1)">◀ POPRZEDNI</button>
            <button class="btn-nav" onclick="changeMonth(1)">NASTĘPNY ▶</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div id="editModal">
    <h3 id="modalTitle" style="margin:0 0 15px 0; color:var(--blue); text-align:center;">Ustawienia</h3>
    <span class="modal-label">Stawka PLN/h:</span>
    <input type="number" id="editRate" style="width:100%; background:#000; color:#fff; border:1px solid #444; padding:10px; border-radius:6px; margin-bottom:15px;">
    
    <span class="modal-label" style="font-weight:bold;">Godziny Pracy:</span>
    <div class="time-row"><input type="time" id="workStart"> <input type="time" id="workEnd"></div>
    
    <div style="margin-top:15px; padding-top:10px; border-top:1px solid #444;">
        <span class="break-label">PRZERWA 1:</span>
        <div class="time-row"><input type="time" id="editB1S"> <input type="time" id="editB1E"></div>
        <span class="break-label">PRZERWA 2:</span>
        <div class="time-row"><input type="time" id="editB2S"> <input type="time" id="editB2E"></div>
        <span class="break-label">PRZERWA 3:</span>
        <div class="time-row"><input type="time" id="editB3S"> <input type="time" id="editB3E"></div>
    </div>

    <div style="display:flex; justify-content: space-between; margin:20px 0 15px 0;">
        <button onclick="applyToBulk('week')" style="background:#222; color:var(--green); border:1px solid var(--green); padding:10px; border-radius:6px; width:48%; font-size:11px;">KOPIUJ TYDZIEŃ</button>
        <button onclick="applyToBulk('month')" style="background:#222; color:var(--green); border:1px solid var(--green); padding:10px; border-radius:6px; width:48%; font-size:11px;">KOPIUJ MIESIĄC</button>
    </div>
    <div style="display:flex; gap:10px;">
        <button style="flex:%on style="flex:1; padding:12px; background:var(--blue); color:black; border:none; border-radius:8px; font-weight:bold;" onclick="saveDay()">Zapisz</button>
    </div>
</div>

<script>
const monthNames = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień"⁷,"Październik","Listopad","Grudzień"];
const dayNamesLong = ["Niedziela", "Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota"];

let viewDate = new Date();
let daysData = JSON.parse(localStorage.getItem("workData") || "{}");
let currentEditingKey = null;
const settingsIcon = `<svg class="edit-btn" viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>`;

function getKey(date) { return date.getFullYear() + "-" + (date.getMonth() + 1) + "-" + date.getDate(); }

function openEdit(key) {
    currentEditingKey = key;
    const data = daysData[key] || {rate: 80, work: 1, start: "00:00", end: "00:00", customBreaks: []};
    document.getElementById("modalTitle").textContent = "Ustaw: " + key;
    document.getElementById("editRate").value = data.rate || 80;
    document.getElementById("workStart").value = data.start || "00:00";
    document.getElementById("workEnd").value = data.end || "00:00";
    for(let i=1; i<=3; i++) {
        const b = (data.customBreaks && data.customBreaks[i-1]) ? data.customBreaks[i-1] : ["", ""];
        document.getElementById(`editB${i}S`).value = b[0]; document.getElementById(`editB${i}E`).value = b[1];
    }
    document.getElementById("editModal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("editModal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function saveDay() {
    const key = currentEditingKey;
    if(!daysData[key]) daysData[key] = {work:1};
    daysData[key].rate = Number(document.getElementById("editRate").value);
    daysData[key].start = document.getElementById("workStart").value;
    daysData[key].end = document.getElementById("workEnd").value;
    daysData[key].customBreaks = [];
    for(let i=1; i<=3; i++) {
        let s = document.getElementById(`editB${i}S`).value, e = document.getElementById(`editB${i}E`).value;
        if(s && e) daysData[key].customBreaks.push([s, e]);
    }
    localStorage.setItem("workData", JSON.stringify(daysData));
    closeModal(); render();
}

function applyToBulk(mode) {
    const rate = Number(document.getElementById("editRate").value);
    const start = document.getElementById("workStart").value;
    const end = document.getElementById("workEnd").value;
    const breaks = [];
    for(let i=1; i<=3; i++) {
        let s = document.getElementById(`editB${i}S`).value, e = document.getElementById(`editB${i}E`).value;
        if(s && e) breaks.push([s, e]);
    }
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const lastDay = new Date(y, m + 1, 0).getDate();
    let targets = [];
    if(mode === 'month') { for(let d=1; d<=lastDay; d++) targets.push(new Date(y, m, d)); }
    else {
        const baseDate = new Date(currentEditingKey);
        let dw = baseDate.getDay();
        let diff = (dw === 0 ? -6 : 1 - dw);
        let mon = new Date(baseDate); mon.setDate(baseDate.getDate() + diff);
        for(let i=0; i<7; i++) {
            let d = new Date(mon); d.setDate(mon.getDate() + i);
            if(d.getMonth() === m) targets.push(d);
        }
    }
    targets.forEach(date => {
        let k = getKey(date);
        if(!daysData[k]) daysData[k] = {work: 1}; 
        daysData[k].rate = rate; daysData[k].start = start; daysData[k].end = end; daysData[k].customBreaks = breaks;
    });
    localStorage.setItem("workData", JSON.stringify(daysData));
    closeModal(); render();
}

function calculateWork(date, dayObj) {
    if (!dayObj || dayObj.work === 0) return 0;
    let sTime = dayObj.start || "00:00", eTime = dayObj.end || "00:00";
    if (sTime === eTime) return 0;
    let now = new Date();
    let start = new Date(date); start.setHours(...sTime.split(":").map(Number),0,0);
    let end = new Date(date); end.setHours(...eTime.split(":").map(Number),0,0);
    let finish;
    if (date.toDateString() === now.toDateString()) {
        if (now < start) return 0;
        finish = now > end ? end : now;
    } else { finish = date > now ? null : end; }
    if (!finish || finish <= start) return 0;
    let totalMs = finish - start;
    (dayObj.customBreaks || []).forEach(b => {
        let bs = new Date(date); bs.setHours(...b[0].split(":").map(Number),0,0);
        let be = new Date(date); be.setHours(...b[1].split(":").map(Number),0,0);
        let overlap = Math.min(finish, be) - Math.max(start, bs);
        if (overlap > 0) totalMs -= overlap;
    });
    return Math.max(0, totalMs / 3600000);
}

function render() {
    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";
    let m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById("monthTitle").textContent = monthNames[m] + " " + y;
    let lastDay = new Date(y, m+1, 0).getDate();
    let totH = 0, totM = 0, wH = 0, wM = 0;
    let todayKey = getKey(new Date());

    for(let d=1; d<=lastDay; d++) {
        let date = new Date(y, m, d), dw = date.getDay(), key = getKey(date);
        if(!daysData[key]) daysData[key] = {rate:80, work:1, start:"00:00", end:"00:00", customBreaks:[]};
        let h = calculateWork(date, daysData[key]), mv = h * (daysData[key].rate || 80);
        totH += h; totM += mv; wH += h; wM += mv;
        let tr = document.createElement("tr");
        if(dw === 6) tr.className = "saturday";
        if(dw === 0) tr.className = "sunday";
        if(key === todayKey) tr.classList.add("today");
        if(daysData[key].work === 0) tr.classList.add("dayOff");
        tr.innerHTML = `<td>${d}</td><td>${date.toLocaleDateString('pl-PL',{weekday:'short'})}</td><td>${h.toFixed(2)}</td><td>${mv.toFixed(0)}</td><td onclick="openEdit('${key}')">${settingsIcon}</td>`;
        tr.onclick = (e) => { if(e.target.closest('.edit-btn') || e.target.cellIndex === 4) return; daysData[key].work = daysData[key].work?0:1; localStorage.setItem("workData", JSON.stringify(daysData)); render(); };
        tbody.appendChild(tr);
        if(dw === 0 || d === lastDay) {
            tbody.insertAdjacentHTML('beforeend', `<tr class="weekSummary"><td colspan="2">TYDZIEŃ</td><td>${wH.toFixed(2)}</td><td colspan="2">${wM.toFixed(0)} zł</td></tr>`);
            wH = 0; wM = 0;
        }
    }
    document.getElementById("totalHours").textContent = totH.toFixed(2);
    document.getElementById("totalMoney").textContent = totM.toFixed(0) + " zł";
}

function formatTimeLeft(ms) {
    let s = Math.floor(ms / 1000); let m = Math.floor(s / 60); let h = Math.floor(m / 60);
    s %= 60; m %= 60;
    return (h > 0 ? h + "h " : "") + (m > 0 || h > 0 ? m + "m " : "") + s + "s";
}

function changeMonth(step) { viewDate.setMonth(viewDate.getMonth() + step); render(); }

setInterval(() => {
    let now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("pl-PL");
    document.getElementById("dayLabel").textContent = dayNamesLong[now.getDay()];
    let key = getKey(now);
    let dObj = daysData[key];
    let breakInfo = "";
    
    if(dObj && dObj.work !== 0 && dObj.start !== dObj.end) {
        let s = new Date(); s.setHours(...dObj.start.split(":").map(Number),0,0);
        let e = new Date(); e.setHours(...dObj.end.split(":").map(Number),0,0);

        // Pasek postępu i zarobek dziś
        if(now >= s && now <= e) {
            document.getElementById("progress-bar").style.width = ((now - s) / (e - s) * 100) + "%";
            document.getElementById("todayWork").textContent = `Dziś: ${calculateWork(now, dObj).toFixed(2)}h`;
        } else if (now > e) {
            document.getElementById("progress-bar").style.width = "100%";
            document.getElementById("todayWork").innerHTML = '<span style="color:#ffd700;">FAJRANT! 🍻</span>';
        }

        // Logika PRZERW
        let currentBreak = null;
        let nextBreak = null;

        (dObj.customBreaks || []).forEach(b => {
            let bs = new Date(); bs.setHours(...b[0].split(":").map(Number),0,0);
            let be = new Date(); be.setHours(...b[1].split(":").map(Number),0,0);

            if(now >= bs && now < be) {
                currentBreak = be - now;
            } else if (bs > now && (!nextBreak || bs < nextBreak)) {
                nextBreak = bs;
            }
        });

        if(currentBreak) {
            breakInfo = `<span style="color:var(--green)">PRZERWA! (zostało: ${formatTimeLeft(currentBreak)})</span>`;
        } else if(nextBreak) {
            breakInfo = `Przerwa za: ${formatTimeLeft(nextBreak - now)}`;
        }
    }
    document.getElementById("breakTimer").innerHTML = breakInfo;
}, 1000);

function updateWeather() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&relative_humidity_2m=true`)
            .then(res => res.json())
            .then(data => {
                const temp = Math.round(data.current_weather.temperature);
                const hum = data.current_weather.relative_humidity_2m;
                document.getElementById('weather-info').innerHTML = 
                    `🌡️ ${temp}°C | 💧 ${hum}% wilgotności`;
            })
            .catch(() => {
                document.getElementById('weather-info').innerText = "Pogoda: błąd połączenia";
            });
    }, () => {
        document.getElementById('weather-info').innerText = "Włącz lokalizację w tel.";
    });
}
updateWeather();
setInterval(updateWeather, 900000);
    
render();
</script>
</body>
</html>
