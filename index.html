<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zarobek & Tygodnie v7.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; 
            --glass: rgba(22, 27, 34, 0.85);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e6edf3; 
            --blue: #00eaff; 
            --green: #00ffa6; 
            --orange: #ff9900; 
            --red: #ff4040;
            --gold: #ffd700;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Roboto', sans-serif; 
            margin: 0; padding: 10px; padding-bottom: 40px;
            background: radial-gradient(circle at 0% 0%, rgba(0, 234, 255, 0.07) 0%, transparent 45%),
                        radial-gradient(circle at 100% 100%, rgba(255, 153, 0, 0.07) 0%, transparent 45%);
            background-attachment: fixed;
        }
        
        .header { 
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px; 
            padding: 20px; text-align: center; margin-bottom: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #clock { 
            font-size: 42px; color: var(--blue); font-weight: 700; 
            text-shadow: 0 0 15px var(--blue); letter-spacing: -1px;
        }
        
        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 3px; margin: 12px 0; overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--blue);
            box-shadow: 0 0 15px var(--blue); transition: width 1s linear;
        }

        #status { font-size: 18px; color: var(--green); font-weight: 500; }

        .fajrant {
            color: var(--gold) !important;
            font-weight: 900 !important;
            font-size: 26px !important;
            text-shadow: 0 0 20px var(--gold);
            animation: pulse-fajrant 0.8s infinite alternate;
            display: block; margin-top: 10px;
        }

        @keyframes pulse-fajrant {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }
        
        .break-container {
            margin-top: 15px; padding: 10px;
            background: rgba(255, 153, 0, 0.08);
            border-radius: 12px; font-size: 13px;
            border: 1px solid rgba(255, 153, 0, 0.3);
        }
        #break-timer { font-weight: bold; color: var(--orange); }

        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { 
            background: var(--glass); border: 1px solid var(--border); color: var(--text); 
            width: 50px; height: 50px; border-radius: 15px; font-size: 24px;
        }
        #month-year { font-size: 20px; font-weight: 700; font-family: 'Poiret One'; }

        .table-wrapper { 
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px 5px; font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 14px 5px; text-align: center; border-bottom: 1px solid var(--border); font-size: 14px; }

        .week-summary-row {
            background: rgba(0, 234, 255, 0.08) !important;
            font-size: 11px !important;
            color: var(--blue) !important;
            border-bottom: 2px solid rgba(0, 234, 255, 0.2) !important;
        }
        .week-summary-row td { padding: 8px 5px !important; font-weight: bold; }

        /* POPRAWIONE GUZIKI WŁ/WYŁ */
        .btn-status { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); 
            border-radius: 20px; padding: 4px 10px; font-size: 9px; font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-status.active { 
            border-color: var(--green); color: var(--green); 
            box-shadow: 0 0 5px rgba(0, 255, 166, 0.2);
        }
        .btn-status.inactive { 
            border-color: var(--red); color: var(--red); 
            background: rgba(255, 64, 64, 0.1);
            box-shadow: 0 0 8px rgba(255, 64, 64, 0.4);
            text-shadow: 0 0 5px var(--red);
        }

        .btn-edit { background: none; border: none; font-size: 18px; margin-left: 5px; cursor: pointer; }

        .row-sat { color: var(--blue); }
        .row-sun { color: var(--red); }
        .row-today { background: rgba(255, 153, 0, 0.1) !important; color: var(--orange) !important; font-weight: 700; }
        .row-off { opacity: 0.35; }

        .notes-section {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; margin-top: 10px;
        }
        .notes-section h3 { margin: 0 0 10px 0; font-family: 'Poiret One'; color: var(--blue); font-size: 18px; }
        #global-notes {
            width: 100%; min-height: 80px; background: transparent; border: none;
            color: var(--text); font-family: 'Roboto', sans-serif; outline: none; resize: none;
        }

        .footer-row { background: rgba(255,255,255,0.08); font-size: 16px; font-weight: 700; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div id="clock">00:00:00</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="status">Wczytywanie...</div>
        <div class="break-container" id="break-box">
            <span id="break-label">Do przerwy:</span> <span id="break-timer">--:--:--</span>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn" onclick="moveMonth(-1)">‹</button>
        <div id="month-year">---</div>
        <button class="nav-btn" onclick="moveMonth(1)">›</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr> <th style="width:20%">Data</th> <th style="width:15%">Dzień</th> <th style="width:18%">Godz.</th> <th style="width:22%">PLN</th> <th style="width:25%">Opcje</th> </tr>
            </thead>
            <tbody id="main-table"></tbody>
            <tfoot>
                <tr class="footer-row">
                    <td colspan="2" style="text-align: left; padding-left: 20px;">SUMA MIESIĄC</td>
                    <td id="sum-h">0.00</td>
                    <td id="sum-m" style="color: var(--green);">0 zł</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="notes-section">
        <h3>UWAGI I NOTATKI</h3>
        <textarea id="global-notes" placeholder="Wpisz notatki..." oninput="saveNotes()"></textarea>
    </div>

    <div class="app-footer" style="text-align: center; margin-top: 20px; opacity: 0.5;">
        <span style="font-family: 'Poiret One'; letter-spacing: 2px;">by damian muttke</span>
    </div>
</div>

<script>
    const CONFIG = { start: 7, end: 19, endSat: 16, rate: 80, months: ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"] };
    let viewDate = new Date();
    let db = JSON.parse(localStorage.getItem('PRACA_V5') || '{}');
    document.getElementById('global-notes').value = localStorage.getItem('GLOBAL_NOTES') || "";

    function save() { localStorage.setItem('PRACA_V5', JSON.stringify(db)); }
    function saveNotes() { localStorage.setItem('GLOBAL_NOTES', document.getElementById('global-notes').value); }
    function getID(d) { return d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0') + '-' + d.getDate().toString().padStart(2, '0'); }

    function getDayBreaks(date) {
        const id = getID(date);
        if (db[id] && db[id].breaks) return db[id].breaks;
        return (date.getDay() === 6) ? [[10.5, 11], [13.5, 14]] : [[10.5, 11], [14.5, 15]];
    }

    function calculate(date) {
        const id = getID(date); const day = date.getDay();
        const s = db[id] || { work: true, rate: CONFIG.rate, manual: null };
        if (day === 0 || !s.work) return 0;
        if (s.manual !== null) return s.manual;
        const now = new Date(); const start = new Date(date).setHours(CONFIG.start, 0, 0, 0);
        const limit = (day === 6) ? CONFIG.endSat : CONFIG.end;
        const end = new Date(date).setHours(limit, 0, 0, 0);
        let finish;
        if (id === getID(now)) { if (now < start) return 0; finish = Math.min(now, end); } 
        else if (date < now) { finish = end; } else return 0;
        let diff = (finish - start) / 3600000;
        getDayBreaks(date).forEach(b => {
            const bS = new Date(date).setHours(Math.floor(b[0]), (b[0]%1)*60, 0, 0);
            const bE = new Date(date).setHours(Math.floor(b[1]), (b[1]%1)*60, 0, 0);
            if (finish > bS) diff -= (Math.min(finish, bE) - bS) / 3600000;
        });
        return Math.max(0, diff);
    }

    function updateLive() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL');
        const day = now.getDay();
        const startH = CONFIG.start, endH = (day === 6) ? CONFIG.endSat : CONFIG.end;
        const endTimeMs = new Date().setHours(endH, 0, 0, 0);
        
        const progress = Math.max(0, Math.min(100, ((now - new Date().setHours(startH,0,0,0)) / ((endH-startH)*3600000)) * 100));
        document.getElementById('progress-bar').style.width = progress + "%";

        const hToday = calculate(now);
        const statusEl = document.getElementById('status');
        
        if (now >= endTimeMs && day !== 0) {
            statusEl.innerText = "FAJRANT !!!"; statusEl.className = "fajrant";
            document.getElementById('break-box').style.display = "none";
        } else {
            const hh = Math.floor(hToday), mm = Math.floor((hToday%1)*60), ss = Math.floor(((hToday%1)*60%1)*60);
            statusEl.innerText = `Zarobek: ${hh}h ${mm}m ${ss}s`;
            statusEl.className = "";
            let breaks = getDayBreaks(now), found = false;
            for (let b of breaks) {
                const bS = new Date().setHours(Math.floor(b[0]), (b[0]%1)*60, 0, 0);
                const bE = new Date().setHours(Math.floor(b[1]), (b[1]%1)*60, 0, 0);
                if (now < bS) { document.getElementById('break-label').innerText = "Następna przerwa za:"; document.getElementById('break-timer').innerText = formatDiff(bS-now); found = true; break; } 
                else if (now >= bS && now <= bE) { document.getElementById('break-label').innerText = "Zasłużona przerwa:"; document.getElementById('break-timer').innerText = formatDiff(bE-now); found = true; break; }
            }
            document.getElementById('break-box').style.display = found ? "block" : "none";
        }
        updateTotals();
    }

    function formatDiff(ms) {
        const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
        return `${h}h ${m}m ${s}s`;
    }

    function updateTotals() {
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        let th = 0, tm = 0;
        for (let d = 1; d <= new Date(y, m+1, 0).getDate(); d++) {
            const h = calculate(new Date(y, m, d));
            th += h; tm += (h * (db[getID(new Date(y, m, d))]?.rate || CONFIG.rate));
        }
        document.getElementById('sum-h').innerText = th.toFixed(2);
        document.getElementById('sum-m').innerText = tm.toFixed(0) + " zł";
    }

    function renderTable() {
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('month-year').innerText = `${CONFIG.months[m]} ${y}`;
        const container = document.getElementById('main-table');
        container.innerHTML = ""; const todayStr = getID(new Date());
        
        let weekH = 0, weekM = 0;

        for (let d = 1; d <= new Date(y, m+1, 0).getDate(); d++) {
            const date = new Date(y, m, d), id = getID(date), dw = date.getDay();
            const s = db[id] || { work: true, rate: CONFIG.rate };
            const h = calculate(date);
            
            weekH += h; weekM += (h * s.rate);

            const tr = document.createElement('tr');
            if (id === todayStr) tr.className = 'row-today'; else if (dw === 6) tr.className = 'row-sat'; else if (dw === 0) tr.className = 'row-sun';
            if (!s.work) tr.classList.add('row-off');
            
            tr.innerHTML = `
                <td>${d}.${(m+1).toString().padStart(2,'0')}</td>
                <td style="font-size:11px">${date.toLocaleDateString('pl-PL',{weekday:'short'})}</td>
                <td>${h.toFixed(2)}</td>
                <td>${(h * s.rate).toFixed(0)} zł</td>
                <td>
                    <button class="btn-status ${s.work ? 'active' : 'inactive'}" onclick="toggleDay('${id}')">${s.work ? 'WŁ' : 'WYŁ'}</button>
                    <button class="btn-edit" onclick="editDay('${id}')">⚙️</button>
                </td>`;
            container.appendChild(tr);

            if (dw === 0 || d === new Date(y, m+1, 0).getDate()) {
                const sr = document.createElement('tr');
                sr.className = 'week-summary-row';
                sr.innerHTML = `<td colspan="2">TYDZIEŃ</td><td>${weekH.toFixed(2)}h</td><td colspan="2">${weekM.toFixed(0)} zł</td>`;
                container.appendChild(sr);
                weekH = 0; weekM = 0;
            }
        }
        updateTotals();
    }

    function toggleDay(id) { if(!db[id]) db[id]={work:true, rate:CONFIG.rate}; db[id].work=!db[id].work; save(); renderTable(); }
    
    // POPRAWIONA FUNKCJA EDYCJI Z PRZERWAMI
    function editDay(id) {
        if(!db[id]) db[id]={work:true, rate:CONFIG.rate, manual:null};
        const r = prompt("Stawka:", db[id].rate); if(r===null) return;
        const m = prompt("Ręczne godziny:", db[id].manual||"");
        
        let cb = getDayBreaks(new Date(id));
        const bc = prompt("Liczba przerw:", cb.length);
        if(bc !== null) {
            let nb = [];
            for(let i=0; i<bc; i++) {
                const s = prompt(`Start przerwy ${i+1} (np. 10:30):`, (i===0)?"10:30":"14:30");
                const e = prompt(`Koniec przerwy ${i+1} (np. 11:00):`, (i===0)?"11:00":"15:00");
                if(s && e) {
                    const sH = Number(s.split(':')[0]) + Number(s.split(':')[1])/60;
                    const eH = Number(e.split(':')[0]) + Number(e.split(':')[1])/60;
                    nb.push([sH, eH]);
                }
            }
            db[id].breaks = nb;
        }

        db[id].rate = Number(r); 
        db[id].manual = m === "" ? null : Number(m); 
        save(); 
        renderTable();
    }

    function moveMonth(offset) { viewDate.setMonth(viewDate.getMonth() + offset); renderTable(); }
    
    setInterval(updateLive, 1000);
    renderTable();
</script>
</body>
</html>
